name: release

# Conventional Commits drive releases. On each push to main, release-please keeps an open release PR
# that collects the changes and the next version. Merging that PR tags the release (vX.Y.Z), writes
# CHANGELOG.md, and publishes a GitHub Release; the publish jobs below then build the images and the
# CLI in the same run.
#
# The publish jobs run as dependent jobs here rather than on a release event, because a release
# created by the default GITHUB_TOKEN cannot trigger a separate `on: release` workflow.
on:
  push:
    branches: [main]

# No blanket permissions; each job requests only what it needs.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Cross-compile the CLI for every platform, stamp the release version into the binaries and the npm
  # package.jsons, and publish loft-cli plus its per-platform packages. The NPM_TOKEN secret is used
  # directly (no protected environment); it is temporary and goes away with the move to OIDC below.
  npm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # publish npm provenance attestations
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # The package.json versions are already set by release-please on the tagged commit; this only
      # stamps the version into the binary.
      - name: cross-compile the CLI
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: LOFT_VERSION="$TAG" ./npm/build.sh
      # Auth is the NPM_TOKEN secret for now. Trusted publishing (OIDC) needs each package to already
      # exist with a trusted publisher configured, so the first release has to run on the token to
      # create them. To switch afterward: configure a trusted publisher on npmjs.com for each of the
      # six packages (repo larsakerlund/loft, workflow release.yml), then delete the NODE_AUTH_TOKEN
      # line below and the NPM_TOKEN secret. id-token: write above already covers OIDC, and --provenance
      # stays. Trusted publishing wants npm >= 11.5.1, so add an `npm i -g npm@latest` step if the
      # bundled npm is older.
      # Platform packages first, so the wrapper's optionalDependencies resolve once it is published.
      - name: publish to npm
        env:
          # No protected environment by choice; the token is short-lived (removed at the OIDC switch).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # zizmor: ignore[secrets-outside-env]
        run: |
          for dir in npm/loft-cli-* npm/loft-cli; do
            echo "publishing $dir"
            ( cd "$dir" && npm publish --access public --provenance )
          done

  # Build each architecture on its own native runner (no QEMU emulation, which makes the arm64 build
  # the slow part), scan it, and push it to GHCR by digest only. docker-merge stitches the per-arch
  # digests into one tagged multi-arch manifest per image.
  docker-build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: loftd
            context: .
            dockerfile: Dockerfile
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: loftd
            context: .
            dockerfile: Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: loft-web
            context: web
            dockerfile: web/Dockerfile
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: loft-web
            context: web
            dockerfile: web/Dockerfile
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: derive a filesystem-safe platform tag
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      # Build this arch natively into the local daemon and scan it BEFORE any push, so a vulnerable
      # image never reaches the registry. The push below reuses the warmed layers, so the scan adds no
      # recompile.
      - name: build ${{ matrix.image }} ${{ matrix.platform }} for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          platforms: ${{ matrix.platform }}
          tags: ${{ matrix.image }}:scan
      - name: scan the image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table
          trivyignores: .trivyignore
      # Push by digest only (no tag); docker-merge assembles the tagged manifest.
      - name: build and push ${{ matrix.image }} ${{ matrix.platform }} by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          # No cache on a release build: a release is a trust anchor, so it builds clean from source.
          provenance: false
      - name: export the digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests for each image into one multi-arch manifest, tag it (exact version,
  # major.minor, major, latest), and attest its provenance.
  docker-merge:
    needs: [release-please, docker-build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [loftd, loft-web]
    permissions:
      contents: read
      packages: write
      id-token: write # keyless signing of the provenance attestation
      attestations: write # record the attestation on the repo
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.release-please.outputs.version }}
            type=raw,value=${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            type=raw,value=${{ needs.release-please.outputs.major }}
            type=raw,value=latest
      - name: create and push the multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          REPO: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
        run: |
          args=()
          while IFS= read -r tag; do args+=(--tag "$tag"); done \
            < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          for digest in *; do args+=("$REPO@sha256:$digest"); done
          docker buildx imagetools create "${args[@]}"
      - id: digest
        name: read the manifest digest
        env:
          REPO: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          digest=$(docker buildx imagetools inspect "$REPO:$VERSION" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
