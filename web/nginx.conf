# Local-dev ingress for Loft. Plain nginx: serves the root site and user sites, proxies /api to
# loftd, serves uploaded files. No authentication here on purpose: the local loop runs auth-off and
# loftd takes the signed-in user from LOFT_DEV_USER. A real deployment fronts loftd with its own
# authenticating proxy; loftd validates bearer tokens and the X-Loft-Site header regardless, so the
# API is never trusted-open.

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Resolve the loftd upstream per request via Docker's embedded DNS (127.0.0.11), so rebuilding the
# backend (which gives it a new container IP) does not leave nginx pinned to a stale address. Using a
# variable in proxy_pass is what forces the runtime re-resolution.
resolver 127.0.0.11 ipv6=off valid=10s;

# The two server blocks below repeat the /api/ proxy directives, differing only in the X-Loft-Site
# value (empty for the root site, the captured subdomain for a user site).

# Root site: the bare host (localhost) serves the built web app and the deploy API.
server {
  listen 8080;
  server_name localhost;
  set $loftd "backend:8082";

  location /api/ {
    proxy_pass http://$loftd;
    client_max_body_size 26m;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_read_timeout 1h;
    proxy_set_header X-Loft-Site "";
  }

  # Public CLI discovery (no auth): `loft login` reads OAuth config from here.
  location /.well-known/loft {
    proxy_pass http://$loftd;
    proxy_set_header Host $http_host;
  }

  location /uploads/ {
    alias /mnt/uploads/_apex/;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html =404; }
}

# User sites: <site>.localhost -> /mnt/loft/<site>/ (the local stand-in for site storage).
server {
  listen 8080 default_server;
  server_name ~^(?<site>[^.]+)\.localhost$;
  set $loftd "backend:8082";

  location /api/ {
    proxy_pass http://$loftd;
    client_max_body_size 26m;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_read_timeout 1h;
    proxy_set_header X-Loft-Site $site;
  }

  location ^~ /uploads/ {
    alias /mnt/uploads/$site/;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  root /mnt/loft/$site;
  index index.html;
  location / { try_files $uri $uri/ /404.html /index.html =404; }
}
