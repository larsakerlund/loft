# Web image for Loft: serve the built console at the apex host, serve deployed sites from the sites
# mount at <site>.<domain>, serve uploaded files, and show the platform placeholder for a site that
# does not exist yet. Plain static nginx over the sites/uploads mounts.
#
# In the local dev loop this image is also the ingress and proxies /api to loftd. A real deployment
# fronts it with its own authenticating proxy that owns auth and the API route, so the /api blocks
# here are only exercised standalone.
#
# Rendered at container start: nginx envsubst replaces ${LOFT_DOMAIN} (from the env, default localhost
# set in the Dockerfile) in /etc/nginx/templates. nginx's own $variables are left untouched. The
# user-site server matches any host with a leading label, so only the apex match needs the domain.

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Resolve the loftd upstream per request via Docker's embedded DNS, so rebuilding the backend (new
# container IP) does not leave nginx pinned to a stale address. Only used standalone (see header).
resolver 127.0.0.11 ipv6=off valid=10s;

# Root site: the bare domain serves the built web app (and, standalone, the deploy API).
server {
  listen 8080;
  server_name ${LOFT_DOMAIN};
  set $loftd "backend:8082";

  location /api/ {
    proxy_pass http://$loftd;
    client_max_body_size 26m;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_read_timeout 1h;
    proxy_set_header X-Loft-Site "";
  }

  # Public CLI discovery (no auth): `loft login` reads OAuth config from here.
  location /.well-known/loft {
    proxy_pass http://$loftd;
    proxy_set_header Host $http_host;
  }

  location /uploads/ {
    alias /mnt/uploads/_apex/;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html =404; }
}

# User sites: <site>.<domain> -> /mnt/loft/<site>/. The leading-label capture needs no domain
# knowledge; the apex server above wins for the bare domain by exact-match precedence.
server {
  listen 8080 default_server;
  server_name ~^(?<site>[^.]+)\.;
  set $loftd "backend:8082";

  location /api/ {
    proxy_pass http://$loftd;
    client_max_body_size 26m;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_read_timeout 1h;
    proxy_set_header X-Loft-Site $site;
  }

  location ^~ /uploads/ {
    alias /mnt/uploads/$site/;
    default_type application/octet-stream;
    add_header Content-Disposition "attachment" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  root /mnt/loft/$site;
  index index.html;

  # Cache file handles/metadata briefly so repeat requests skip filesystem round-trips, short enough
  # that a fresh deploy still shows within seconds.
  open_file_cache max=10000 inactive=60s;
  open_file_cache_valid 2s;
  open_file_cache_errors on;

  location / { try_files $uri $uri/ /404.html /index.html =404; }

  # A site that does not exist yet gets "create this site"; a 404 inside an existing site that ships
  # no own 404.html gets "not found". A site's own 404.html (tried above) always wins.
  error_page 404 @notfound;
  location @notfound {
    set $sys "create-site";
    if (-d /mnt/loft/$site) { set $sys "not-found"; }
    root /usr/share/nginx;
    rewrite ^ /__loft-sys/$sys.html break;
  }
  location ^~ /__loft-sys/ {
    internal;
    root /usr/share/nginx;
  }
}
